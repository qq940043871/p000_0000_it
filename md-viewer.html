<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@13.0.1/dist/markdown-it.min.js"></script>
    <style>
        body {
            background-color: #f9fafb;
            margin: 0;
            padding: 0;
        }
        .container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        .sidebar {
            width: 280px;
            background-color: white;
            border-right: 1px solid #e5e7eb;
            padding: 1.5rem;
            overflow-y: auto;
            position: sticky;
            top: 0;
            height: 100vh;
        }
        .sidebar h3 {
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 1rem;
            color: #374151;
        }
        .toc {
            list-style: none;
            padding: 0;
        }
        .toc li {
            margin-bottom: 0.5rem;
        }
        .toc a {
            text-decoration: none;
            color: #6b7280;
            display: block;
            padding: 0.25rem 0;
            transition: color 0.2s;
        }
        .toc a:hover {
            color: #3b82f6;
        }
        .toc-level-2 {
            padding-left: 1rem;
        }
        .toc-level-3 {
            padding-left: 2rem;
        }
        .content {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }
        .markdown-content {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            border-radius: 0.5rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            padding: 2rem;
        }
        .markdown-content h1 {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 1rem;
            scroll-margin-top: 5rem;
        }
        .markdown-content h2 {
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            scroll-margin-top: 5rem;
        }
        .markdown-content h3 {
            font-size: 1.25rem;
            font-weight: bold;
            margin-top: 1.25rem;
            margin-bottom: 0.75rem;
            scroll-margin-top: 5rem;
        }
        .markdown-content p {
            margin-bottom: 1rem;
        }
        .markdown-content ul,
        .markdown-content ol {
            margin-bottom: 1rem;
            padding-left: 1.5rem;
        }
        .markdown-content li {
            margin-bottom: 0.5rem;
        }
        .markdown-content code {
            background-color: #f3f4f6;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-family: monospace;
        }
        .markdown-content pre {
            background-color: #f3f4f6;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin-bottom: 1rem;
        }
        .markdown-content pre code {
            background-color: transparent;
            padding: 0;
        }
        .markdown-content blockquote {
            border-left: 4px solid #e5e7eb;
            padding-left: 1rem;
            margin-bottom: 1rem;
            color: #6b7280;
        }
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid #e5e7eb;
                max-height: 200px;
            }
        }
        .sidebar.collapsed {
            width: 0;
            padding: 0;
            overflow: hidden;
        }
        .content.expanded {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar" id="sidebar">
            <div class="flex justify-between items-center mb-4">
                <h3>文档大纲</h3>
                <button id="toggleToc" class="text-gray-500 hover:text-primary">
                    <i class="fas fa-chevron-left"></i>
                </button>
            </div>
            <ul class="toc" id="toc"></ul>
        </div>
        <div class="content">
            <div class="markdown-content" id="content"></div>
        </div>
    </div>
    <script>
        // 获取URL参数中的文件路径
        function getQueryParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }
        
        // 生成文档大纲
        function generateTOC(text) {
            const headings = text.match(/^(#{1,3})\s+(.*)$/gm);
            const toc = [];
            
            if (headings) {
                headings.forEach(heading => {
                    const level = heading.match(/^#{1,3}/)[0].length;
                    const title = heading.replace(/^#{1,3}\s+/, '');
                    const id = title.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
                    toc.push({ level, title, id });
                });
            }
            
            return toc;
        }
        
        // 渲染大纲
        function renderTOC(toc) {
            const tocElement = document.getElementById('toc');
            tocElement.innerHTML = '';
            
            toc.forEach(item => {
                const li = document.createElement('li');
                li.className = `toc-level-${item.level}`;
                
                const a = document.createElement('a');
                a.href = `#${item.id}`;
                a.textContent = item.title;
                
                // 添加点击事件，实现平滑滚动
                    a.addEventListener('click', function(e) {
                        e.preventDefault();
                        const targetId = this.getAttribute('href').substring(1);
                        const targetElement = document.getElementById(targetId);
                        if (targetElement) {
                            targetElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }
                    });
                
                li.appendChild(a);
                tocElement.appendChild(li);
            });
        }
        
        // 为标题添加ID
        function addHeadingIds(html) {
            return html.replace(/<h([1-3])>(.*?)<\/h[1-3]>/g, (match, level, title) => {
                const id = title.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
                return `<h${level} id="${id}">${title}</h${level}>`;
            });
        }
        
        const mdFile = getQueryParam('file');
        
        // 大纲切换功能
        const toggleTocBtn = document.getElementById('toggleToc');
        const sidebar = document.getElementById('sidebar');
        const content = document.querySelector('.content');
        
        if (toggleTocBtn && sidebar && content) {
            toggleTocBtn.addEventListener('click', function() {
                sidebar.classList.toggle('collapsed');
                content.classList.toggle('expanded');
                
                const icon = this.querySelector('i');
                if (sidebar.classList.contains('collapsed')) {
                    icon.classList.remove('fa-chevron-left');
                    icon.classList.add('fa-chevron-right');
                } else {
                    icon.classList.remove('fa-chevron-right');
                    icon.classList.add('fa-chevron-left');
                }
            });
        }
        
        if (mdFile) {
            // 加载并渲染MD文件
            fetch(mdFile)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Failed to load markdown file');
                    }
                    return response.text();
                })
                .then(text => {
                    // 生成大纲
                    const toc = generateTOC(text);
                    renderTOC(toc);
                    
                    // 渲染Markdown
                    const md = window.markdownit();
                    let html = md.render(text);
                    
                    // 为标题添加ID
                    html = addHeadingIds(html);
                    
                    document.getElementById('content').innerHTML = html;
                })
                .catch(error => {
                    document.getElementById('content').innerHTML = `<h1>Error</h1><p>Failed to load markdown file: ${error.message}</p>`;
                });
        } else {
            document.getElementById('content').innerHTML = '<h1>Error</h1><p>No markdown file specified</p>';
        }
    </script>
</body>
</html>
